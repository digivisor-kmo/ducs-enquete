<!DOCTYPE html><html lang="nl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>DUCs Dendermonde - Enquete dashboard 2025-2026</title><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"><style>
*{box-sizing:border-box}
:root{
 --bg1:#f6f2e9;--bg2:#eef3ec;--surface:#fffdf8;--surface-2:#fbf7ef;--surface-3:#f7f1e6;
 --ink:#2a2620;--ink-2:#564f44;--muted:#8a8170;
 --line:#ece3d3;--line-2:#f2ebde;
 --brand:#2f8159;--brand-2:#236147;--brand-ink:#1c4f39;--brand-soft:#e3f1e8;--brand-soft-2:#eef6f0;
 --accent:#d97b41;--accent-ink:#b25a23;--accent-soft:#fbeede;
 --gold:#d8a72b;
 --s0:#d06450;--s1:#e0944a;--s2:#e3b94e;--s3:#5fa365;--s4:#2f8159;
 --neg:#d06450;--pos:#2f8159;
 --shadow-sm:0 1px 2px rgba(74,58,30,.06);
 --shadow:0 2px 5px rgba(74,58,30,.05),0 10px 28px rgba(74,58,30,.07);
 --shadow-lg:0 14px 40px rgba(74,58,30,.13);
 --r:20px;--r-sm:14px;--r-xs:10px;
 --serif:"Fraunces",Georgia,"Times New Roman",serif;
 --sans:"Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
}
html{-webkit-text-size-adjust:100%}
body{margin:0;font-family:var(--sans);color:var(--ink);line-height:1.55;-webkit-font-smoothing:antialiased;
 background:linear-gradient(180deg,#f7f3ea 0%,#f1f0e7 30%,#eef3ec 100%);background-attachment:fixed;min-height:100vh}
.wrap{max-width:1080px;margin:0 auto;padding:0 22px 90px}
::selection{background:var(--brand-soft);color:var(--brand-ink)}

/* hero */
.hero{position:relative;overflow:hidden;color:#fff;
 background:radial-gradient(120% 140% at 12% -10%,#3a9468 0%,#2f8159 42%,#215f44 100%)}
.hero::after{content:"";position:absolute;right:-60px;top:-80px;width:280px;height:280px;border-radius:50%;
 background:rgba(255,255,255,.07)}
.hero::before{content:"";position:absolute;right:90px;bottom:-120px;width:200px;height:200px;border-radius:50%;
 background:rgba(255,255,255,.05)}
.hero-in{position:relative;max-width:1080px;margin:0 auto;padding:26px 22px 24px;z-index:1}
.brand{display:flex;align-items:center;gap:14px}
.brand .mark{width:48px;height:48px;border-radius:14px;flex:none;display:grid;place-items:center;font-weight:800;font-size:17px;
 background:rgba(255,255,255,.16);border:1px solid rgba(255,255,255,.25);backdrop-filter:blur(4px);letter-spacing:.02em}
.brand h1{font-family:var(--serif);font-size:25px;margin:0;font-weight:600;letter-spacing:-.01em;line-height:1.1}
.brand .sub{font-size:13px;color:rgba(255,255,255,.82);margin-top:3px}
.brand .meta{margin-left:auto;text-align:right;font-size:12.5px;color:rgba(255,255,255,.85);line-height:1.4}
.brand .meta b{font-size:18px;font-family:var(--serif);font-weight:600;color:#fff;display:block}

/* sticky bar */
.appbar{position:sticky;top:0;z-index:40;background:rgba(247,243,234,.85);backdrop-filter:saturate(150%) blur(12px);
 -webkit-backdrop-filter:saturate(150%) blur(12px);border-bottom:1px solid transparent;transition:border-color .2s,box-shadow .2s}
.appbar.stuck{border-color:var(--line);box-shadow:0 6px 22px rgba(74,58,30,.07)}
.appbar-in{max-width:1080px;margin:0 auto;padding:13px 22px 0}
.gsearch{position:relative;margin-bottom:12px}
.gsearch input{width:100%;padding:13px 44px 13px 44px;border:1px solid var(--line);border-radius:14px;font-size:14.5px;font-family:var(--sans);
 background:var(--surface);box-shadow:var(--shadow-sm);transition:border-color .15s,box-shadow .15s;color:var(--ink)}
.gsearch input::placeholder{color:var(--muted)}
.gsearch input:focus{outline:none;border-color:var(--brand);box-shadow:0 0 0 4px var(--brand-soft)}
.gsearch .ico{position:absolute;left:15px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:16px;pointer-events:none}
.gsearch .clr{position:absolute;right:9px;top:50%;transform:translateY(-50%);border:0;background:var(--surface-3);color:var(--ink-2);
 width:30px;height:30px;border-radius:9px;cursor:pointer;font-size:17px;display:none;align-items:center;justify-content:center}
.gsearch.has .clr{display:flex}
.tabs{display:flex;flex-wrap:wrap;gap:8px;padding-bottom:13px}
.tabs button{display:inline-flex;align-items:center;gap:7px;border:1px solid var(--line);background:var(--surface);
 padding:9px 14px;border-radius:12px;font-size:13px;font-weight:550;font-family:var(--sans);cursor:pointer;color:var(--ink-2);
 white-space:nowrap;transition:all .15s;line-height:1}
.tabs button .tic{width:16px;height:16px;flex:none;color:var(--brand);transition:color .15s,transform .15s}
.tabs button:hover{border-color:#cdbfa6;color:var(--ink);background:var(--surface-2);transform:translateY(-1px)}
.tabs button:hover .tic{transform:scale(1.08)}
.tabs button:focus-visible{outline:none;border-color:var(--brand);box-shadow:0 0 0 4px var(--brand-soft)}
.tabs button.on{background:var(--brand);color:#fff;border-color:var(--brand);box-shadow:0 4px 13px rgba(47,129,89,.30)}
.tabs button.on .tic{color:#fff}
@media(max-width:640px){.tabs button{font-size:12.5px;padding:8px 12px}.tabs button .tic{width:15px;height:15px}}

/* conclusion */
.concl{position:relative;background:linear-gradient(155deg,var(--brand-soft) 0%,var(--surface) 65%);border:1px solid var(--line);
 border-radius:var(--r);padding:22px 24px 22px 26px;margin:24px 0 6px;box-shadow:var(--shadow)}
.concl::before{content:"";position:absolute;left:0;top:14px;bottom:14px;width:4px;border-radius:0 4px 4px 0;
 background:linear-gradient(var(--brand),var(--gold))}
.concl .k{display:inline-flex;align-items:center;gap:7px;font-size:11px;letter-spacing:.1em;text-transform:uppercase;
 color:var(--brand-ink);font-weight:700;margin-bottom:9px}
.concl .k::before{content:"";width:8px;height:8px;border-radius:50%;background:var(--brand)}
.concl p{margin:0;font-size:16px;line-height:1.7;color:var(--ink-2)}

/* stat cards */
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(165px,1fr));gap:15px;margin:20px 0}
.stat{background:var(--surface);border:1px solid var(--line);border-radius:var(--r-sm);padding:18px 20px;box-shadow:var(--shadow-sm);
 transition:transform .15s,box-shadow .15s}
.stat:hover{transform:translateY(-2px);box-shadow:var(--shadow)}
.stat .n{font-family:var(--serif);font-size:34px;font-weight:600;color:var(--brand-2);letter-spacing:-.02em;line-height:1}
.stat .l{font-size:12.5px;color:var(--muted);margin-top:9px;line-height:1.4}

/* section heading */
.sec-h{display:flex;align-items:baseline;gap:10px;margin:30px 0 13px}
.sec-h h2{font-family:var(--serif);font-size:18px;margin:0;font-weight:600;color:var(--ink);letter-spacing:-.01em}
.sec-h .badge{font-size:12px;color:var(--muted);font-weight:500}

/* chart card */
.chart{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:18px 20px;box-shadow:var(--shadow-sm)}
.bar-row{display:grid;grid-template-columns:182px 1fr 46px;align-items:center;gap:13px;padding:6px 0;font-size:13px}
.bar-row+.bar-row{border-top:1px solid var(--line-2)}
.bar-row .lbl{text-align:right;color:var(--ink-2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bar-track{position:relative;background:var(--surface-3);border-radius:8px;height:24px;overflow:hidden}
.bar-fill{height:100%;border-radius:8px;width:0;transition:width .8s cubic-bezier(.22,1,.36,1)}
.bar-row .val{font-weight:700;font-variant-numeric:tabular-nums;text-align:right;color:var(--ink)}
.lik-track{position:relative;height:24px;background:linear-gradient(90deg,#f7e6df 0 50%,#e7f1ea 50% 100%);border-radius:8px;overflow:hidden}
.lik-mid{position:absolute;left:50%;top:0;bottom:0;width:1px;background:#cdbfa6}
.lik-fill{position:absolute;top:0;height:100%;border-radius:6px;width:0;transition:width .8s cubic-bezier(.22,1,.36,1)}
.legend{font-size:11.5px;color:var(--muted);display:flex;gap:14px;flex-wrap:wrap;margin:13px 2px 0}
.legend span{display:inline-flex;align-items:center;gap:5px}.dot{width:11px;height:11px;border-radius:3px}

/* distribution */
.opt-row{display:grid;grid-template-columns:1fr auto;align-items:center;gap:14px;padding:8px 0;font-size:13px}
.opt-row+.opt-row{border-top:1px solid var(--line-2)}
.opt-row .lbl{color:var(--ink-2)}
.opt-row .barwrap{display:flex;align-items:center;gap:10px;justify-self:end;width:240px}
.opt-bar{height:20px;background:linear-gradient(90deg,#e89255,#d97b41);border-radius:7px;min-width:3px;width:0;transition:width .8s cubic-bezier(.22,1,.36,1)}
.opt-row .c{width:24px;font-weight:700;text-align:right;font-variant-numeric:tabular-nums;color:var(--ink)}

/* controls */
.controls{display:flex;gap:10px;margin:22px 0 6px;flex-wrap:wrap;align-items:center}
.tq-wrap{position:relative;flex:1;min-width:210px}
.tq-wrap .ico{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:14px}
.controls input[type=search]{width:100%;padding:10px 12px 10px 35px;border:1px solid var(--line);border-radius:11px;font-size:13.5px;
 background:var(--surface);font-family:var(--sans);color:var(--ink)}
.controls input[type=search]:focus{outline:none;border-color:var(--brand);box-shadow:0 0 0 4px var(--brand-soft)}
.seg{display:inline-flex;background:var(--surface-3);border:1px solid var(--line);border-radius:11px;padding:3px;gap:2px}
.seg button{border:0;background:transparent;padding:7px 14px;font-size:12.5px;font-weight:500;cursor:pointer;color:var(--ink-2);border-radius:8px;transition:all .12s}
.seg button:hover{color:var(--ink)}
.seg button.on{background:var(--surface);color:var(--brand-ink);font-weight:600;box-shadow:var(--shadow-sm)}

/* accordions */
details.acc{background:var(--surface);border:1px solid var(--line);border-radius:var(--r-sm);margin:11px 0;overflow:hidden;box-shadow:var(--shadow-sm)}
details.acc>summary{cursor:pointer;padding:14px 17px;font-size:14px;font-weight:600;color:var(--ink);list-style:none;
 display:flex;justify-content:space-between;align-items:center;gap:10px;transition:background .12s}
details.acc>summary::-webkit-details-marker{display:none}
details.acc>summary .chev{color:var(--muted);transition:transform .2s;font-size:15px;flex:none}
details.acc[open]>summary .chev{transform:rotate(90deg);color:var(--brand)}
details.acc[open]>summary{border-bottom:1px solid var(--line-2)}
details.acc>summary:hover{background:var(--surface-2)}
.accbody{padding:14px 16px}

/* option groups */
.optgrp+.optgrp{margin-top:15px;padding-top:14px;border-top:1px solid var(--line-2)}
.optgrp .ohd{font-size:13px;font-weight:650;color:var(--ink);margin-bottom:10px;display:flex;align-items:center;gap:8px}
.optgrp .ohd .cnt{font-size:11px;font-weight:600;color:var(--brand-ink);background:var(--brand-soft);border-radius:999px;padding:2px 9px}
.optgrp.isno .ohd{color:var(--muted)}.optgrp.isno .ohd .cnt{color:var(--muted);background:var(--surface-3)}
.names{display:flex;flex-wrap:wrap;gap:7px}
.nm{font-size:12.5px;background:var(--brand-soft);color:var(--brand-ink);border:1px solid #cfe6d6;border-radius:9px;padding:5px 11px;font-weight:500}
.nm.no{background:var(--surface-3);color:var(--muted);border-color:var(--line)}

/* person cards */
.person{background:var(--surface-2);border:1px solid var(--line);border-radius:var(--r-sm);padding:13px 15px;margin-bottom:11px}
.person:last-child{margin-bottom:0}
.person h3{margin:0 0 9px;font-size:14px;font-weight:650;display:flex;align-items:center;gap:9px;flex-wrap:wrap}
.chips{display:flex;flex-wrap:wrap;gap:6px}
.chip{font-size:11px;padding:4px 9px;border-radius:8px;color:#fff;font-weight:600;white-space:nowrap;letter-spacing:.01em}
.chip .v{font-variant-numeric:tabular-nums}
.txt{font-size:13.5px;background:var(--surface);border:1px solid var(--line);border-left:3px solid var(--accent);
 padding:9px 12px;border-radius:0 9px 9px 0;margin:8px 0 0;color:var(--ink-2);line-height:1.55}
.txt b{color:var(--accent-ink);font-weight:600}
.tagq{display:inline-block;font-size:10.5px;color:var(--brand-ink);background:var(--brand-soft);border-radius:999px;padding:2px 10px;margin-bottom:7px;font-weight:600}
.exclt{font-size:10.5px;color:var(--s0);font-weight:600;background:#fbe9e4;border-radius:999px;padding:2px 9px}
.muted{color:var(--muted);font-weight:400;font-size:12px}
.hidden{display:none}
.gcount{font-size:13.5px;color:var(--accent-ink);margin:20px 2px 16px;padding:13px 16px;background:var(--accent-soft);border:1px solid #f0dcc4;border-radius:12px}
.gcount b{font-family:var(--serif)}
.empty{text-align:center;color:var(--muted);font-size:14px;padding:34px}
.fade{animation:fade .35s ease both}@keyframes fade{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}

@media(max-width:640px){
 .bar-row{grid-template-columns:1fr;gap:4px}
 .bar-row .lbl{text-align:left;white-space:normal}.bar-row .val{text-align:left}
 .opt-row{grid-template-columns:1fr}.opt-row .barwrap{width:100%;justify-self:start}
 .brand h1{font-size:21px}.brand .meta{font-size:11px}
 .concl p{font-size:14.5px}
}

const D={"tabs": [{"id": "overzicht", "label": "Overzicht", "intro": "Algemeen beeld: de club staat er sportief goed voor. De trainers worden unaniem geprezen en de motivatie zit hoog. Het grootste discussiepunt voor de vergadering is niveaudifferentiatie (recreatief versus competitief), waar de groep exact verdeeld is. Daarnaast keren een paar praktische knelpunten terug (trainingsuren, geen eigen vaste locatie, douche/wc) en is er een gezonde groep vrijwilligers die zich verder wil engageren.", "stats": [["Totaal reacties", 36], ["Volwassen spelers (DUC)", 26], ["Ouders", 6], ["Jeugdspelers (DUC-ling)", 4]], "note": "Tip: gebruik de zoekbalk en filterknoppen in elke tab. Scores lopen van 0 (slecht) tot 4 (super), tenzij anders vermeld. Trainers worden niet meegerekend in de scores van hun eigen trainingsdag (Thijs op donderdag, Daan op dinsdag), net als mensen die niet aan dat onderdeel deelnemen. Ze blijven wel zichtbaar met de tag \"niet meegerekend\"."}, {"id": "donderdag", "label": "Donderdag (tactiek)", "intro": "Conclusie: de tactische donderdagtraining wordt gewaardeerd, vooral de uitleg (3,0) en tactiek (2,84). De zwakste punten zijn techniek (1,72, de laagste score van de hele enquete) en opwarming (2,16). In de opmerkingen komt steeds hetzelfde terug: meer techniek en werptechniek, een hogere lat voor gevorderden met differentiatie, en het beter doorvertalen van de geoefende tactiek naar de match (freeze-momenten, endzoneplays). Thijs is als donderdagtrainer niet meegerekend.", "filters": ["comment"], "scoreBlocks": [{"title": "Beoordeling onderdelen donderdag", "block": {"labels": ["Intensiteit", "Tactiek", "Techniek", "Oefeningen", "Uitleg", "Niveau", "Opwarming", "Link oef.-spelfases", "Focus comp.-voorbereiding"], "avg": {"Intensiteit": 2.4, "Tactiek": 2.84, "Techniek": 1.72, "Oefeningen": 2.72, "Uitleg": 3.0, "Niveau": 2.32, "Opwarming": 2.16, "Link oef.-spelfases": 2.44, "Focus comp.-voorbereiding": 2.24}, "persons": [{"naam": "Vackier Thijs", "scores": {"Intensiteit": 4, "Tactiek": 4, "Techniek": 4, "Oefeningen": 4, "Uitleg": 4, "Niveau": 4, "Opwarming": 4, "Link oef.-spelfases": 4, "Focus comp.-voorbereiding": 4}, "excl": true, "comments": [{"label": "Verduidelijking", "text": "De donderdag trainer is écht fantastisch."}, {"label": "Wat kan beter", "text": "Gratis drank"}]}, {"naam": "Hurckmans Alex", "scores": {"Intensiteit": 3, "Tactiek": 3, "Techniek": 2, "Oefeningen": 3, "Uitleg": 3, "Niveau": 3, "Opwarming": 2, "Link oef.-spelfases": 2, "Focus comp.-voorbereiding": 2}, "excl": false, "comments": [{"label": "Wat kan beter", "text": "Lucht duels, pull training/ onderdeel, lay-out training"}]}, {"naam": "Jassogne Rikke", "scores": {"Intensiteit": 2, "Tactiek": 3, "Techniek": 2, "Oefeningen": 3, "Uitleg": 3, "Niveau": 2, "Opwarming": 2, "Link oef.-spelfases": 2, "Focus comp.-voorbereiding": 2}, "excl": false, "comments": [{"label": "Wat kan beter", "text": "Idee om op te splitsen naar niveau voor bepaalde onderdelen in de training. Bijvoorbeeld werpoefeningen andere groep dan tactiek oefeningen. Meer gerichter mensen coachen, mensen in bepaalde posities voorbereiden"}]}, {"naam": "Segers Lennert", "scores": {"Intensiteit": 2, "Tactiek": 3, "Techniek": 2, "Oefeningen": 2, "Uitleg": 4, "Niveau": 3, "Opwarming": 1, "Link oef.-spelfases": 2, "Focus comp.-voorbereiding": 3}, "excl": false, "comments": []}, {"naam": "Van Droogenbroeck Joris", "scores": {"Intensiteit": 2, "Tactiek": 3, "Techniek": 3, "Oefeningen": 3, "Uitleg": 2, "Niveau": 1, "Opwarming": 1, "Link oef.-spelfases": 2, "Focus comp.-voorbereiding": 1}, "excl": false, "comments": [{"label": "Verduidelijking", "text": "Soms vind ik de oefeningen in \"drill\" vorm nogal vreemd in het geheel toegepast. Ik weet niet hoe de trainingsopbouw in frisbee zit maar ik wil gerust eens uitleggen hoe ze dzt in andere doelsporten doen."}, {"label": "Wat kan beter", "text": "Meer met vaste groepen trainen in functie van buoc/bumoc. Zo zijn we beter voorbereid op de wedstrijden."}]}, {"naam": "Maes jelle", "scores": {"Intensiteit": 3, "Tactiek": 3, "Techniek": 1, "Oefeningen": 3, "Uitleg": 3, "Niveau": 3, "Opwarming": 2, "Link oef.-spelfases": 3, "Focus comp.-voorbereiding": 3}, "excl": false, "comments": [{"label": "Verduidelijking", "text": "Opwarmingen zijn soms repititief."}, {"label": "Wat kan beter", "text": "Werptechniek komt niet aan bod. We oefenen wel soorten worpen maar iedereen doet deze beetje anders en niet steeds technisch juist."}]}, {"naam": "Lars Mettepenningen", "scores": {"Intensiteit": 3, "Tactiek": 4, "Techniek": 2, "Oefeningen": 4, "Uitleg": 3, "Niveau": 3, "Opwarming": 2, "Link oef.-spelfases": 4, "Focus comp.-voorbereiding": 3}, "excl": false, "comments": []}, {"naam": "Bernauw Koen", "scores": {"Intensiteit": 2, "Tactiek": 3, "Techniek": 2, "Oefeningen": 2, "Uitleg": 3, "Niveau": 1, "Opwarming": 2, "Link oef.-spelfases": 2, "Focus comp.-voorbereiding": 2}, "excl": false, "comments": [{"label": "Verduidelijking", "text": "Ik vind de tactische training + uitleg echt goed, zeker voor de grote meerderheid van de spelers is dit ook heel belangrijk. Ook ik leer hier nog uit. Maar ik word er niet door uitgedaagd. Ik heb nood aan tactische en technische trainingen waarbij de lat hoger ligt. De next steps. Moeilijkere worpen, meer druk, hogere verwachtingen. Dit kan mijn niveau nog omhoog tillen en ook dat van andere spelers die reeds klaar zijn voor de next steps."}, {"label": "Wat kan beter", "text": "Trainingen opsplitsen in verschillende blokken : opwarming, technisch, tactisch en match. Verschillende trainers aanstellen voor deze verschillende blokken. Daarnaast de technische en tactische blokken opsplitsen in trainingsgroepen : Basics en Gevorderd. Per blok en per training kunnen spelers in andere trainingsgroepen ingedeeld worden : bijvoorbeeld voor training 1 zit speler x in technisch blok : gevorderd en in tactisch blok : basics. Voor training 2 (ander onderwerp/focus) zit speler x in de omgekeerde blokken. Zo geraken de middenmoters niet vast in 1 trainingsgroep en kan er ook makkelijker feedback gegeven worden waarom iemand in een bepaalde groep ingedeeld wordt. Dit is een meer fluïde systeem waarbij je wel heel wat trainers nodig hebt maar waarbij er minder verwachtingen zijn van de trainers : hun taak is meer afgebakend."}]}, {"naam": "Maarten De Schrijver", "scores": {"Intensiteit": 3, "Tactiek": 3, "Techniek": 3, "Oefeningen": 3, "Uitleg": 4, "Niveau": 3, "Opwarming": 3, "Link oef.-spelfases": 3, "Focus comp.-voorbereiding": 3}, "excl": false, "comments": [{"label": "Verduidelijking", "text": "neen, goed bezig"}, {"label": "Wat kan beter", "text": "is ok"}]}, {"naam": "Lybeert Daan", "scores": {"Intensiteit": 2, "Tactiek": 2, "Techniek": 2, "Oefeningen": 2, "Uitleg": 2, "Niveau": 2, "Opwarming": 2, "Link oef.-spelfases": 2, "Focus comp.-voorbereiding": 2}, "excl": false, "comments": []}, {"naam": "Schepers robbert", "scores": {"Intensiteit": 2, "Tactiek": 2, "Techniek": 2, "Oefeningen": 2, "Uitleg": 2, "Niveau": 2, "Opwarming": 2, "Link oef.-spelfases": 2, "Focus comp.-voorbereiding": 2}, "excl": false, "comments": []}, {"naam": "Mertens Wout", "scores": {"Intensiteit": 3, "Tactiek": 3, "Techniek": 2, "Oefeningen": 3, "Uitleg": 1, "Niveau": 2, "Opwarming": 3, "Link oef.-spelfases": 2, "Focus comp.-voorbereiding": 2}, "excl": false, "comments": [{"label": "Wat kan beter", "text": "De uren, geen vast veld hebben, geen toilet ter beschikking hebben.\nZaken waar we wel invloed op hebben: Tijdens de training kiezen we er vaak enkele fases uit waar we op trainen, maar tijdens de match nadien hervallen we vaak in gewoontes. Nu en dan (niet overdreven veel om het spel ook niet lam te leggen) eens een \"freeze\" door de trainer die op zaken wijst/bij stuurt zou misschien wel handig kunnen zijn. Of tijdens een drankpauze wat pointers geven."}]}, {"naam": "Sian De Backer", "scores": {"Intensiteit": 2, "Tactiek": 2, "Techniek": 1, "Oefeningen": 2, "Uitleg": 3, "Niveau": 1, "Opwarming": 2, "Link oef.-spelfases": 1, "Focus comp.-voorbereiding": 0}, "excl": false, "comments": [{"label": "Verduidelijking", "text": "Ik zou het niet erg vinden om de groep op te delen, en besef hierbij goed dat de kans er is dat ik in de \"moet nog leren\" groep terechtkom, maar op deze manier is er een streefdoel om naar de \"ervaren\" groep te kunnen groeien. Ik merk heel hard dat nieuwe mensen de basis soms niet goed meehebben. De tactiek ligt voor de rest goed, de flying duc heeft ons dit jaar heel goed gedaan. Het technische element kan beter.\nOefeningen of tactieken doorheen de training worden niet genoeg geforceerd tijdens de match op het einde maar dit is zeker niet 100% de schuld van de trainer.\n\nIk ben voorstander van opgesplitste groep op de \"serieuze\" training donderdag, allemaal samen op de \"fun\" training dinsdag, op deze manier heb je nog altijd sociaal contact met iedereen op dinsdag. Ook de opwarming en match kunnen perfect mixed blijven op donderdag."}, {"label": "Wat kan beter", "text": "Ik heb alles in het vak hierboven geschreven 🫢"}]}, {"naam": "Sander Verhasselt", "scores": {"Intensiteit": 1, "Tactiek": 3, "Techniek": 2, "Oefeningen": 3, "Uitleg": 3, "Niveau": 3, "Opwarming": 4, "Link oef.-spelfases": 4, "Focus comp.-voorbereiding": 4}, "excl": false, "comments": [{"label": "Verduidelijking", "text": "Ik denk dat het voor ervaren spelers inderdaad makkelijker zou zijn om meer vooruitgang te maken zonder nieuwe spelers, maar ik vind dit geen probleem. We spelen allemaal voor ons plezier en ik denk dat er meer plezier is in een club waar iedereen volledig welkom is."}, {"label": "Wat kan beter", "text": "Soms mag het intensiever. Zeker wanneer er meer uitleg gegeven wordt, kan er afgewisseld worden met meer intensieve oefeningen om goed warm te blijven."}]}, {"naam": "Mertens Marte", "scores": {"Intensiteit": 3, "Tactiek": 3, "Techniek": 2, "Oefeningen": 3, "Uitleg": 4, "Niveau": 2, "Opwarming": 3, "Link oef.-spelfases": 3, "Focus comp.-voorbereiding": 2}, "excl": false, "comments": [{"label": "Verduidelijking", "text": "Niveau hangt samen met iedereen mee te krijgen, beginners en mensen die al langer spelen"}]}, {"naam": "Jérôme Botoko Ekila", "scores": {"Intensiteit": 2, "Tactiek": 2, "Techniek": 1, "Oefeningen": 4, "Uitleg": 3, "Niveau": 2, "Opwarming": 2, "Link oef.-spelfases": 2, "Focus comp.-voorbereiding": 2}, "excl": false, "comments": []}, {"naam": "Lisse Nobels", "scores": {"Intensiteit": 2, "Tactiek": 3, "Techniek": 2, "Oefeningen": 2, "Uitleg": 2, "Niveau": 2, "Opwarming": 1, "Link oef.-spelfases": 2, "Focus comp.-voorbereiding": 1}, "excl": false, "comments": [{"label": "Verduidelijking", "text": "Het zou extra leuk zijn als er iets meer variatie zou zitten in de opwarmingsoefeningen.\n\nTactiek: zone was een hele grote meerwaarde!\nOndanks de zoneverdedeging die geoefend werd, vond ik de voorbereidingen naar een wedstrijd zeer beperkt (weinig samenspelen, veel wisselde spelers, tactiek vb. Endzoneplays werden niet toegepast op speeldagen omdat niet iedereen deze goed kent)"}]}, {"naam": "Dafne Nobels", "scores": {"Intensiteit": 2, "Tactiek": 3, "Techniek": 2, "Oefeningen": 3, "Uitleg": 3, "Niveau": 2, "Opwarming": 1, "Link oef.-spelfases": 3, "Focus comp.-voorbereiding": 2}, "excl": false, "comments": []}, {"naam": "Dessein Niels", "scores": {"Intensiteit": 2, "Tactiek": 2, "Techniek": 1, "Oefeningen": 2, "Uitleg": 2, "Niveau": 2, "Opwarming": 2, "Link oef.-spelfases": 1, "Focus comp.-voorbereiding": 1}, "excl": false, "comments": [{"label": "Verduidelijking", "text": "Ik wil graag benadrukken dat ik vind dat Thijs het heel goed doet als trainer in het huidige format. Hij heeft aandacht voor iedereen, geeft goede uitleg, staat open voor suggesties,... Ik mis een beetje een 'echte' coach(en) die spelers durft wijzen op hun tekortkomingen / werkpunten en ook knopen kan/wil doorhakken. Daarnaast denk ik dat het niveau van de DUC's kan verbeteren als spelers worden ingedeeld op hun positie en hier ook specifiek op trainen. Het is uiteraard moeilijk om dat te doen met maar 1 trainer..."}, {"label": "Wat kan beter", "text": "Zie boven"}]}, {"naam": "Gheyssens Sander", "scores": {"Intensiteit": 2, "Tactiek": 4, "Techniek": 1, "Oefeningen": 3, "Uitleg": 4, "Niveau": 3, "Opwarming": 1, "Link oef.-spelfases": 3, "Focus comp.-voorbereiding": 2}, "excl": false, "comments": [{"label": "Verduidelijking", "text": "Beginners belemmeren voortgang, maar dat is op zich geen ergernis."}, {"label": "Wat kan beter", "text": "Meer focus op techniek. Individuele kwaliteit van de spelers gaat zo beter groeien."}]}, {"naam": "Astrid Poelman", "scores": {"Intensiteit": 4, "Tactiek": 3, "Techniek": 1, "Oefeningen": 4, "Uitleg": 4, "Niveau": 4, "Opwarming": 4, "Link oef.-spelfases": 4, "Focus comp.-voorbereiding": 4}, "excl": false, "comments": [{"label": "Verduidelijking", "text": "Er mag meer geoefend worden op techniek"}, {"label": "Wat kan beter", "text": "Een knappere trainer"}]}, {"naam": "Robin De Smedt", "scores": {"Intensiteit": 3, "Tactiek": 4, "Techniek": 2, "Oefeningen": 3, "Uitleg": 4, "Niveau": 3, "Opwarming": 3, "Link oef.-spelfases": 3, "Focus comp.-voorbereiding": 2}, "excl": false, "comments": [{"label": "Verduidelijking", "text": "Onder tactiek miste ik soms misschien wat rond aanval als beginner, zone en defence waren wel heel uitgebreid en kwamen goed van pas op de wedstrijden :)"}]}, {"naam": "Ouahab Yanis", "scores": {"Intensiteit": 3, "Tactiek": 3, "Techniek": 1, "Oefeningen": 1, "Uitleg": 3, "Niveau": 2, "Opwarming": 3, "Link oef.-spelfases": 2, "Focus comp.-voorbereiding": 4}, "excl": false, "comments": [{"label": "Verduidelijking", "text": "Een actieve verdediger en meer realistische spelscenarios lijken mij cruciaal. Het zit al goed maar kan volgens mij nog iets realistischer."}, {"label": "Wat kan beter", "text": "Meer oefenmatch met tactisch doel. (Eén bepaalde formatie proberen en dan feedbackmoment) dit gebeurt nog iets te vaak tij  3, "Link oef.-spelfases": 2}, "excl": false, "comments": []}, {"naam": "Caroline de boeck", "scores": {"Intensiteit": 2, "Tactiek": 2, "Techniek": 2, "Oefeningen": 2, "Uitleg": 2, "Niveau": 2, "Opwarming": 2, "Link oef.-spelfases": 2}, "excl": false, "comments": []}, {"naam": "Karen Basyn", "scores": {"Intensiteit": 3, "Tactiek": 2, "Techniek": 2, "Oefeningen": 3, "Uitleg": 3, "Niveau": 3, "Opwarming": 2, "Link oef.-spelfases": 2}, "excl": false, "comments": []}, {"naam": "Sabine De Hauwere", "scores": {"Intensiteit": 3, "Tactiek": 2, "Techniek": 3, "Oefeningen": 4, "Uitleg": 3, "Niveau": 3, "Opwarming": 3, "Link oef.-spelfases": 3}, "excl": false, "comments": [{"label": "Verduidelijking", "text": "Fijne, plezante trainingen, fijn qua intensiteit - leuke oefeningen + spelletjes"}]}]}}]}, {"id": "trainers", "label": "Trainers & sfeer", "intro": "Conclusie: dit is het sterkste verhaal van de club. De waardering voor de trainers is unaniem en uitbundig, op beide dagen en bij de jeugd. Het favoriete element is bijna unaniem de match op het einde en het sociale aspect (den Uil). Belangrijk signaal: de trainers bereiden alles alleen voor, en meerdere leden vragen uitdrukkelijk om die last te spreiden.", "filters": ["comment"], "comments": [{"title": "Opmerkingen/complimenten voor de trainers", "items": [{"naam": "Vackier Thijs", "text": "Goed bezig!"}, {"naam": "Jassogne Rikke", "text": "Merci voor de inzet. Goed bezig! Om mijn persoonlijke motivatie te behouden zou ik graag voor bepaalde toernooien met een ‘sterker’ team gaan. Blijft zeker ook leuk om voor andere toernooien een mix te behouden."}, {"naam": "Segers Lennert", "text": "Chapeau dat ze er elke week weer staan met goede voorbereiding en niet de gemakkelijkste groep om voor te staan!!"}, {"naam": "Van Droogenbroeck Joris", "text": "Ze doen dat zeer goed. Misschien moeten jullie als bestuur eens nadenken over een vergoeding op basis van vrijwillgers statuut. Dit kan extra motiveren/trainers actief houden."}, {"naam": "Maes jelle", "text": "Goed bezig."}, {"naam": "Lars Mettepenningen", "text": "Het is duidelijk dat er nagedacht wordt over de trainingsoefeningen en dat er veel tijd gespendeerd wordt in de voorbereiding waarvoor bedankt!\nIk vind het ook een leuke combo dat dinsdag het fysieke aspect toch iets meer aan bod komt en dat donderdag vooral toegespitst is op de tactiek. Beide zijn zaken die in de matchen dit seizoen toch wel al het verschil hebben gemaakt."}, {"naam": "Bernauw Koen", "text": "Zowel Daan als Thijs doen dat super goed als trainers. Zeker wetende dat zij alles steeds alleen voorbereiden en helemaal alleen training geven. Dit vraagt veel energie en is niet makkelijk. Het wordt tijd dat meer mensen betrokken worden in de trainingen om zo de druk op de trainers te verlichten en de verantwoordelijkheid voor de trainingen te verdelen over meerdere mensen.\nOok Sander doet dat super goed bij de jeugd! Hij is de sleutel tot het succes van de jeugdwerking! Veel respect voor de 3 heren!"}, {"naam": "Maarten De Schrijver", "text": "veel complimenten! Merci voor de weekelijkse inzet!"}, {"naam": "Mertens Wout", "text": "Een oprechte dank je wel voor de moeite en het werk dat ze er in steken!"}, {"naam": "Sian De Backer", "text": "Thijs: tactiek zit zeer goed, de verdediging trainingen hebben hun vruchten afgeworpen dit jaar.\n\nDaan: U zie ik niet veel jammer genoeg, het ligt aan mij niet aan u ;) Ik hoor van Lisse dat je heel gevarieerde en originele oefeningen geeft!"}, {"naam": "Sander Verhasselt", "text": "Ze doen dat heel goed! Er is veel variatie en originaliteit in de oefeningen."}, {"naam": "Mertens Marte", "text": "Merci voor alle inzet/motivatie en enthousiasme elke keer, doet heel veel!!"}, {"naam": "Jérôme Botoko Ekila", "text": "'Flying DUC' werkt echt heel heel goed. Een heel dikke proficiat voor de trainers hiervoor!!"}, {"naam": "Lisse Nobels", "text": "Bedankt om elke week volledig vrijwillig zoveel tijd te steken in voorbereidingen! Het wordt zeer gewaardeerd ;)"}, {"naam": "Dafne Nobels", "text": "Chapeau voor zowel Thijs als Daan om elke week een leuke training op te stellen en het beste in ons naar boven te halen! Jullie enthousiasme en fierheid over de sport is aanstekelijk."}, {"naam": "Dessein Niels", "text": "Zie boven"}, {"naam": "Gheyssens Sander", "text": "Sterk bezig. Conditie is gestegen dit seizoen. Tactiek en samenspel waren impressive dit seizoen."}, {"naam": "Astrid Poelman", "text": "Goed bezig boys!"}, {"naam": "Robin De Smedt", "text": "Als nieuwtje voelde ik mij heel welkom! De instructies en bijsturing op training waren duidelijk, en heb veel bijgeleerd dit jaar, merci trainer!"}, {"naam": "Ouahab Yanis", "text": "Ik ben zeer blij met de trainers. Zal een groot gemis zijn als een van de trainers stopt."}, {"naam": "Caroline de boeck", "text": "Die zijn gewoon top!"}, {"naam": "Karen Basyn", "text": "Goed bezig mannen, het is niet simpel om de trainingen draaiende te houden met dit aantal trainers!"}, {"naam": "Sabine De Hauwere", "text": "Altijd netjes voorbereid, respect!"}]}, {"title": "Favoriete element aan de trainingen", "items": [{"naam": "Vackier Thijs", "text": "De UIL sessie."}, {"naam": "Jassogne Rikke", "text": "Matchen"}, {"naam": "Segers Lennert", "text": "Overduidelijk de doordachte oefeningen om de tactiek van de DUCs te versterken. (Match)"}, {"naam": "Van Droogenbroeck Joris", "text": "Wedstrijd op het einde en oefenen op diepe worpen/vangen."}, {"naam": "Maes jelle", "text": "De muziekbox op dinsdag en de diepe worpen na de training."}, {"naam": "Lars Mettepenningen", "text": "Oefeningen waar veel contact is met de disc. Ik denk aan de kortere oefeningen waar 2/3 passen gegeven worden maar waar het snel vooruit gaat"}, {"naam": "Bernauw Koen", "text": "Technische oefeningen en match"}, {"naam": "Maarten De Schrijver", "text": "sociale aspect, inclusief 1tje drinken erna"}, {"naam": "Schepers robbert", "text": "Super hard bedankt!"}, {"naam": "Mertens Wout", "text": "Den Uil"}, {"naam": "Sian De Backer", "text": "Match"}, {"naam": "Sander Verhasselt", "text": "De wedstrijdvormen"}, {"naam": "Mertens Marte", "text": "Vooral het sociale, maar dan ook wel goed werken en de resultaten zien in de competitie (bv. Flying duc)"}, {"naam": "Jérôme Botoko Ekila", "text": "Sociaal element"}, {"naam": "Lisse Nobels", "text": "De match ;)"}, {"naam": "Dafne Nobels", "text": "De wedstrijd op het einde van de training"}, {"naam": "Dessein Niels", "text": "Match"}, {"naam": "Gheyssens Sander", "text": "Matchen!"}, {"naam": "Robin De Smedt", "text": "Match"}, {"naam": "Ouahab Yanis", "text": "MATCH"}, {"naam": "Caroline de boeck", "text": "Den uil"}, {"naam": "Karen Basyn", "text": "Anja"}, {"naam": "Sabine De Hauwere", "text": "Opwarmen, spelletjes, matchfases oefenen, lopen, gooien"}]}]}, {"id": "motivatie", "label": "Motivatie & recreatief vs competitief", "intro": "Conclusie: de motivatie om te trainen is hoog en mensen komen zowel voor het sociale als om beter te worden. De kernspanning zit in niveau-opsplitsing: die stelling scoort gemiddeld exact 0,00, de groep is perfect verdeeld. Tactiek wordt wel breed als zinvol gezien (de stelling dat tactiek overbodig is scoort sterk negatief). Wat extra zou motiveren: een vroeger trainingsuur, een vaste eigen locatie, meer uitdaging en concrete doelen, en douches in de winter.", "filters": ["comment"], "scoreBlocks": [{"title": "Motivatie om te komen trainen (1-5)", "block": {"labels": ["Motivatie (1-5)"], "avg": {"Motivatie (1-5)": 4.12}, "persons": [{"naam": "Vackier Thijs", "scores": {"Motivatie (1-5)": 5}, "excl": false}, {"naam": "Hurckmans Alex", "scores": {"Motivatie (1-5)": 5}, "excl": false}, {"naam": "Jassogne Rikke", "scores": {"Motivatie (1-5)": 4}, "excl": false}, {"naam": "Segers Lennert", "scores": {"Motivatie (1-5)": 5}, "excl": false}, {"naam": "Van Droogenbroeck Joris", "scores": {"Motivatie (1-5)": 5}, "excl": false}, {"naam": "Maes jelle", "scores": {"Motivatie (1-5)": 4}, "ex  een wedstrijd te spelen, maar verplaatsingen van meer dan 30min rijden in de week, zie ik niet meteen zitten."}, {"naam": "Mertens Marte", "text": "Dat het niveau soms wel een heel groot verschil was (als beginner toernooi zijnde), een volledig nieuwe Gentse ploeg met allemaal oud Gentl spelers. Maar wel top geregeld!"}, {"naam": "Jérôme Botoko Ekila", "text": "NA"}, {"naam": "Lisse Nobels", "text": "Leuke competitie, maar jammer dat er vanuit de spelers vaak niet genoeg interesse is. Is voor nieuwe spelers de ideale moment om wedstrijdervaring op te doen (ondanks het niveau vrij hoog ligt)of voor ervaren spelers om op elkaar ingespeeld te geraken."}, {"naam": "Dafne Nobels", "text": "Het was moeilijk om in de wintermaanden voldoende spelers gemotiveerd te krijgen om mee te spelen. Zeker als het op verplaatsing was."}, {"naam": "Dessein Niels", "text": "Ik heb niet mee gedaan met FLUF dus negeer bovenstaande"}, {"naam": "Astrid Poelman", "text": "De ene organisator is al wat knapper dan de andere"}, {"naam": "Robin De Smedt", "text": "Helemaal in orde!"}, {"naam": "Karen Basyn", "text": "Het niveau bij andere teams ligt hoog/hoger. We lissen coaching bij deze wedstrijden, zeker omdat hier vaak nieuwe duc’s aan deelnemen."}]}]}, {"id": "jeugd", "label": "Jeugd & ouders", "intro": "Conclusie: een sterk eerste jaar jeugdwerking. Zowel ouders als jeugdspelers zijn zeer positief, de trainers worden als betrokken en kindvriendelijk omschreven en Sander wordt meermaals de sleutel tot het succes genoemd. Het belangrijkste aandachtspunt is het grote leeftijdsverschil bij de U11, dat de niveauscore drukt en al wordt aangepakt via de open trainingen.", "filters": ["comment"], "scoreBlocks": [{"title": "Oudersbeoordeling training van het kind (n=6)", "block": {"labels": ["Niveau", "Intensiteit", "Oefeningen leeftijdsgepast", "Uitleg oefeningen", "Opwarming", "Aandacht trainers", "Focus op mijn kind", "Fairplay-overdracht"], "avg": {"Niveau": 2.5, "Intensiteit": 2.5, "Oefeninge r vanuit de club geen echte sportieve ambities/doelstellingen worden geuit. Voor mij zou het helpen om mezelf in een selectie te (moeten) werken en met die selectie te gaan voor een concreet doel. Ik zou heel graag eens een toernooi winnen! Maar dat lijkt (met de huidige visie/werking) quasi onmogelijk... De trainingen voelen bij mij soms wat nutteloos aan omdat er geen of weinig concrete ambities zijn. Bv. Ik vind onze zone defense heel goed en hier hebben we lang en veel op getraind. Dit heeft bij sommige wedstrijden zijn effect gehad, wat ik de max vond! Maar er waren ook wedstrijden waar het niet werkte omdat er toch nog spelers waren die dit niet konden toepassen. Het is niet alleen de zone, maar ook basisprincipes zoals Force, give and go,... Ik begrijp dat niet iedereen dezelfde ambitie of drive heeft en ben daarom voorstander voor selecties per wedstrijd / toernooi en ev ook op trainingen ter voorbereiding. Zo kunnen de 'die-hards' echt gaan voor een resultaat en kunnen de andere spelers werken aan de punten die nog kunnen verbeteren of gewoon spelen/trainen voor de Fun."}, {"naam": "Gheyssens Sander", "text": "DUC 4 EVER!"}, {"naam": "Astrid Poelman", "text": "Love de DUC’s"}, {"naam": "Ouahab Yanis", "text": "De DuCs zijn leuk"}, {"naam": "Caroline de boeck", "text": "Idee om 10beurtenkaart in te zetten voor mensen die af en toe eens willen meedoen?Mogen oudleden nog naar het nieuwjaarsfeest komen?"}, {"naam": "Karen Basyn", "text": "Als in de toekomst mijn werk-privébalans iets meer gebalanceerd zou zijn, neem ik graag een extra rol op in de club. Dit is voorlopig gewoon nog niet aan de orde."}, {"naam": "Sabine De Hauwere", "text": "Ik vind het nog altijd superfijn om naar de trainingen te komen omdat de sfeer goed is en omdat ik kan bewegen. Soms vraag ik me af of mensen zich niet ergeren aan m'n beperktere engagement, competitiviteit en competentie. Ik krijg niet dat gevoel, maar ik zou het wel begrijpen. Voor mij zou een iets minder \"gedwongen\" teampje binnen de club ideaal zijn en misschien voor de anderen ook :-). Daar zou ik me wel willen engageren om af en toe ad interim iets voor te bereiden of te doen. Uiteraard enkel als dat haalbaar is en als er nog anderen zijn die hier fan van zijn."}, {"naam": "Sabine De Hauwere", "text": "19u. is vaak vroeg voor huiswerk en voor de avondspits. Een kwartier - half uurtje later zou ideaal zijn."}]}]}]};
const SC={'-2':'var(--neg)','-1':'#dd6a4e','0':'#c4cdd7','1':'#6fb45f','2':'var(--pos)',0:'var(--s0)',1:'var(--s1)',2:'var(--s2)',3:'var(--s3)',4:'var(--s4)'};
const SCN={0:'Slecht',1:'Kan beter',2:'Gewoon goed',3:'Heel goed',4:'Super'};
const esc=s=>(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const isNo=s=>/^(nee|neen)\b/i.test(s.trim());
const chipBg=(v,lik)=>(v===null||v===undefined)?'#c4cdd7':SC[lik?String(v):v];
const chipFg=(v,lik)=>(!lik&&v===2)?';color:#5a4708':'';
const IDX=[];
D.tabs.forEach(t=>{
 (t.scoreBlocks||[]).forEach(sb=>sb.block.persons.forEach(p=>{(p.comments||[]).forEach(c=>IDX.push({tab:t.label,naam:p.naam,q:c.label+' · '+sb.title,text:c.text}));}));
 (t.comments||[]).forEach(c=>c.items.forEach(it=>IDX.push({tab:t.label,naam:it.naam,q:c.title,text:it.text})));
 (t.distBlocks||[]).forEach(db=>db.dist.persons.forEach(p=>IDX.push({tab:t.label,naam:p.naam,q:db.title,text:p.answer})));});

function barBlock(b){const max=b.likert?2:4;
 let h=b.labels.map(l=>{const v=b.avg[l];if(v===null||v===undefined)return '';
  if(b.likert){const w=Math.abs(v)/2*50;const left=v>=0?50:50-w;const col=v>=0?'var(--pos)':'var(--neg)';
   return `<div class="bar-row"><div class="lbl">${esc(l)}</div><div class="lik-track"><div class="lik-mid"></div><div class="lik-fill" data-w="${w}" style="left:${left}%;background:${col}"></div></div><div class="val">${v>0?'+':''}${v}</div></div>`}
  const col=v>=3?'var(--s4)':v>=2.5?'var(--s3)':v>=2?'var(--s2)':v>=1?'var(--s1)':'var(--s0)';
  return `<div class="bar-row"><div class="lbl">${esc(l)}</div><div class="bar-track"><div class="bar-fill" data-w="${v/max*100}" style="background:${col}"></div></div><div class="val">${v}</div></div>`}).join('');
 const leg=b.likert?'Schaal: -2 helemaal niet waar &middot; 0 neutraal &middot; +2 helemaal waar'
  :'Schaal: '+[0,1,2,3,4].map(n=>`<span><i class="dot" style="background:${SC[n]}"></i>${n} ${SCN[n]}</span>`).join('');
 return `<div class="chart">${h}</div><div class="legend">${leg}</div>`}
function personCard(p,b){
 const ch=b.labels.map(l=>`<span class="chip" title="${esc(l)}" style="background:${chipBg(p.scores[l],b.likert)}${chipFg(p.scores[l],b.likert)}">${esc(l)}: <span class="v">${p.scores[l]===null||p.scores[l]===undefined?'n.v.t.':p.scores[l]}</span></span>`).join('');
 const cm=(p.comments||[]).map(c=>`<div class="txt"><b>${esc(c.label)}:</b> ${esc(c.text)}</div>`).join('');
 const hasC=(p.comments||[]).length>0;const txtl=(p.comments||[]).map(c=>c.text).join(' ').toLowerCase();
 return `<div class="person" data-name="${esc(p.naam).toLowerCase()}" data-text="${esc(txtl)}" data-excl="${p.excl?1:0}" data-comment="${hasC?1:0}"><h3>${esc(p.naam)}${p.excl?' <span class="exclt">niet meegerekend</span>':''}</h3><div class="chips">${ch}</div>${cm}</div>`}
function distChart(db){const tot=Math.max(...db.dist.options.map(o=>o.count));
 return '<div class="chart">'+db.dist.options.map(o=>`<div class="opt-row"><div class="lbl">${esc(o.label)}</div><div class="barwrap"><div class="opt-bar" data-w="${o.count/tot*100}" data-px="200"></div><div class="c">${o.count}</div></div></div>`).join('')+'</div>'}
function distDetail(db){return db.dist.options.map(o=>{
  const names=db.dist.persons.filter(p=>p.answer.includes(o.label));
  const chips=names.map(p=>`<span class="nm ${isNo(o.label)?'no':''}" data-name="${esc(p.naam).toLowerCase()}" data-text="${esc(o.label).toLowerCase()}">${esc(p.naam)}</span>`).join('');
  return `<div class="optgrp person ${isNo(o.label)?'isno':''}" data-name="${names.map(p=>esc(p.naam.toLowerCase())).join(' ')}" data-text="${esc(o.label).toLowerCase()}" data-comment="0" data-excl="0"><div class="ohd">${esc(o.label)} <span class="cnt">${names.length}</span></div><div class="names">${chips||'<span class="muted">niemand</span>'}</div></div>`;
}).join('')}
function commentItem(it){return `<div class="person" data-name="${esc(it.naam).toLowerCase()}" data-text="${esc(it.text).toLowerCase()}" data-comment="1" data-excl="0"><h3>${esc(it.naam)}</h3><div class="txt">${esc(it.text)}</div></div>`}
function acc(title,count,body,open){return `<details class="acc"${open?' open':''}><summary><span>${title} <span class="muted">(${count})</span></span><span class="chev">›</span></summary><div class="accbody">${body}</div></details>`}
function animate(root){requestAnimationFrame(()=>{root.querySelectorAll('[data-w]').forEach(el=>{
  if(el.dataset.px)el.style.width=(el.dataset.w/100*parseInt(el.dataset.px))+'px';else el.style.width=el.dataset.w+'%';});});}

const FILTNAME={traint:'Traint dinsdag',niet:'Traint niet',comment:'Met opmerking'};
function renderTab(t){let h='';
 h+=`<div class="concl"><span class="k">Conclusie</span><p>${t.intro||''}</p></div>`;
 if(t.stats)h+='<div class="cards">'+t.stats.map(s=>`<div class="stat"><div class="n">${s[1]}</div><div class="l">${s[0]}</div></div>`).join('')+'</div>';
 (t.scoreBlocks||[]).forEach(sb=>{h+=`<div class="sec-h"><h2>${sb.title}</h2></div>`+barBlock(sb.block);});
 (t.distBlocks||[]).forEach(db=>{h+=`<div class="sec-h"><h2>${db.title}</h2></div>`+distChart(db);});
 const details=[];
 (t.scoreBlocks||[]).forEach(sb=>details.push(['Scores per persoon &middot; '+sb.title,sb.block.persons.length,sb.block.persons.map(p=>personCard(p,sb.block)).join(''),false]));
 (t.distBlocks||[]).forEach(db=>details.push(['Wie antwoordde wat &middot; '+db.title,db.dist.persons.length,distDetail(db),!!t.openDetails]));
 (t.comments||[]).forEach(c=>details.push([c.title,c.items.length,c.items.map(commentItem).join(''),false]));
 if(details.length){
  let segs='<button data-f="all" class="on">Iedereen</button>';
  (t.filters||[]).forEach(f=>segs+=`<button data-f="${f}">${FILTNAME[f]}</button>`);
  h+=`<div class="controls"><div class="tq-wrap"><span class="ico">⚲</span><input type="search" class="tq" placeholder="Zoek in de details van deze tab..."></div><div class="seg">${segs}</div></div>`;
  h+='<div id="details">'+details.map(d=>acc(d[0],d[1],d[2],d[3])).join('')+'</div>';
 }
 const c=document.getElementById('content');c.innerHTML=h;c.classList.remove('fade');void c.offsetWidth;c.classList.add('fade');
 animate(c);
 const q=document.querySelector('#content .tq');let F='all';
 function openAll(o){document.querySelectorAll('#details details').forEach(d=>d.open=o);}
 function apply(){const v=(q?q.value.toLowerCase():'');const active=(v||F!=='all');
  if(active)openAll(true);
  document.querySelectorAll('#content .person').forEach(el=>{let ok=true;
   if(F==='traint'&&el.dataset.excl==='1')ok=false;
   if(F==='niet'&&el.dataset.excl==='0')ok=false;
   if(F==='comment'&&el.dataset.comment!=='1')ok=false;
   if(ok&&v)ok=(el.dataset.name||'').includes(v)||(el.dataset.text||'').includes(v);
   el.classList.toggle('hidden',!ok);});
  document.querySelectorAll('#content .nm').forEach(el=>{if(!v){el.classList.remove('hidden');return;}
   el.classList.toggle('hidden',!((el.dataset.name||'').includes(v)||(el.dataset.text||'').includes(v)));});
  if(!active)openAll(false);}
 if(q)q.addEventListener('input',apply);
 document.querySelectorAll('#content .seg button').forEach(b=>b.onclick=()=>{document.querySelectorAll('#content .seg button').forEach(x=>x.classList.remove('on'));b.classList.add('on');F=b.dataset.f;apply();});
}

function tabIcon(id){return `<svg class="tic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">${ICONS[id]||''}</svg>`;}
const tabsEl=document.getElementById('tabs');tabsEl.setAttribute('role','tablist');
const TABBTNS=[];
D.tabs.forEach((t,i)=>{const b=document.createElement('button');b.type='button';b.setAttribute('role','tab');
 b.innerHTML=tabIcon(t.id)+'<span>'+t.label+'</span>';b.setAttribute('aria-selected',i===0?'true':'false');b.tabIndex=i===0?0:-1;
 if(i===0)b.classList.add('on');
 const sel=()=>{TABBTNS.forEach(x=>{x.classList.remove('on');x.setAttribute('aria-selected','false');x.tabIndex=-1;});
  b.classList.add('on');b.setAttribute('aria-selected','true');b.tabIndex=0;renderTab(t);window.scrollTo({top:0,behavior:'smooth'});};
 b.onclick=sel;
 b.addEventListener('keydown',e=>{const n=TABBTNS.length;let j=-1;
  if(e.key==='ArrowRight'||e.key==='ArrowDown')j=(i+1)%n;
  else if(e.key==='ArrowLeft'||e.key==='ArrowUp')j=(i-1+n)%n;
  else if(e.key==='Home')j=0;else if(e.key==='End')j=n-1;
  if(j>=0){e.preventDefault();TABBTNS[j].focus();TABBTNS[j].click();}});
 TABBTNS.push(b);tabsEl.appendChild(b);});
renderTab(D.tabs[0]);

const gw=document.getElementById('gw'),gq=document.getElementById('gq'),gr=document.getElementById('gresults'),main=document.getElementById('main');
function globalSearch(){const v=gq.value.trim().toLowerCase();gw.classList.toggle('has',!!v);
 if(!v){gr.innerHTML='';main.classList.remove('hidden');return;}
 main.classList.add('hidden');
 const hits=IDX.filter(x=>x.naam.toLowerCase().includes(v)||x.text.toLowerCase().includes(v));
 if(!hits.length){gr.innerHTML=`<div class="empty">Geen resultaten voor "${esc(v)}".</div>`;return;}
 const byTab={};hits.forEach(x=>{(byTab[x.tab]=byTab[x.tab]||[]).push(x)});
 let h=`<div class="gcount"><b>${hits.length}</b> resultaten voor "${esc(v)}" in ${Object.keys(byTab).length} thema's. Wis het zoekveld om terug te keren.</div>`;
 Object.keys(byTab).forEach(tab=>{h+=`<div class="sec-h"><h2>${esc(tab)}</h2><span class="badge">${byTab[tab].length}</span></div>`;
  byTab[tab].forEach(x=>{h+=`<div class="person"><div class="tagq">${esc(x.q)}</div><h3>${esc(x.naam)}</h3><div class="txt">${esc(x.text)}</div></div>`});});
 gr.innerHTML=h;gr.classList.add('fade');}
gq.addEventListener('input',globalSearch);
